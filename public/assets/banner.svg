<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="180" rx="200" ry="150" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#34d399" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="400"/><line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/><line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/><line x1="420" y1="0" x2="420" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/><line x1="660" y1="0" x2="660" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/><line x1="780" y1="0" x2="780" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/><line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/><line x1="1020" y1="0" x2="1020" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/><line x1="1140" y1="0" x2="1140" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Logo box -->
  <rect x="556" y="80" width="88" height="88" rx="22" fill="url(#logo)"/>
  <!-- CPU icon -->
  <g transform="translate(578, 102)" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="8" y="8" width="28" height="28" rx="4"/>
    <rect x="14" y="14" width="16" height="16" rx="2"/>
    <line x1="22" y1="2" x2="22" y2="8"/>
    <line x1="22" y1="36" x2="22" y2="42"/>
    <line x1="2" y1="22" x2="8" y2="22"/>
    <line x1="36" y1="22" x2="42" y2="22"/>
    <line x1="14" y1="2" x2="14" y2="8"/>
    <line x1="30" y1="2" x2="30" y2="8"/>
    <line x1="14" y1="36" x2="14" y2="42"/>
    <line x1="30" y1="36" x2="30" y2="42"/>
    <line x1="2" y1="14" x2="8" y2="14"/>
    <line x1="2" y1="30" x2="8" y2="30"/>
    <line x1="36" y1="14" x2="42" y2="14"/>
    <line x1="36" y1="30" x2="42" y2="30"/>
  </g>

  <!-- Title -->
  <text x="600" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" letter-spacing="-1">TuringAI</text>

  <!-- Subtitle -->
  <text x="600" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa" letter-spacing="0.5">AI Chat powered by Kimi K2.5 via NVIDIA NIM</text>

  <!-- Tags -->
  <g transform="translate(600, 290)">
    <!-- Next.js tag -->
    <rect x="-230" y="0" width="100" height="30" rx="15" fill="#1a1a2e" stroke="#27272a" stroke-width="1"/>
    <text x="-180" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">Next.js 15</text>

    <!-- TypeScript tag -->
    <rect x="-110" y="0" width="110" height="30" rx="15" fill="#1a1a2e" stroke="#27272a" stroke-width="1"/>
    <text x="-55" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">TypeScript</text>

    <!-- Tailwind tag -->
    <rect x="20" y="0" width="110" height="30" rx="15" fill="#1a1a2e" stroke="#27272a" stroke-width="1"/>
    <text x="75" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">Tailwind v4</text>

    <!-- AI SDK tag -->
    <rect x="150" y="0" width="100" height="30" rx="15" fill="#1a1a2e" stroke="#27272a" stroke-width="1"/>
    <text x="200" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a1a1aa">AI SDK v5</text>
  </g>

  <!-- Bottom border gradient -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#logo)"/>
</svg>
